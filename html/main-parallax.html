<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta name="keywords" content="금융감독원 통합홈페이지.">
	<meta name="description" content="금융감독원 통합홈페이지.">
	<meta name="format-detection" content="telephone=no">

	<link rel="shortcut icon" href="../resources/img/favicon.png">
	<link href="../resources/css/style.css" type="text/css" rel="stylesheet" />
	<script src="../resources/js/inc_front.js"></script>
	<script src="../resources/js/component/ui-script.js"></script>
	<script src="../resources/js/plugin/swiper-bundle.min.js"></script>
<!-- <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script> -->
	<title>금융감독원 통합홈페이지</title>
	
	<style>
		.mySwiper {width: 100%; height: 100vh; border: 1px solid black;}
/* 구분용 */
		.mySwiper .swiper-slide {
			
		}
		.mySwiper .swiper-slide:nth-child(odd) { background: #f2f2f2; }
		.mySwiper .swiper-slide:nth-child(even) { background: #eee; }
	</style>
</head>
<body>
	<div id="wrap">
		<!-- go to breadcrumb	-->
		<div id="krds-skip-link">
			<a href="#breadcrumb-home">본문 바로가기</a>
		</div>
		<!-- //go to breadcrumb -->

		<!-- top banner -->
		<div id="krds-masthead">
			<div class="toggle-wrap">
				<div class="toggle-head">
					<div class="inner">
						<span class="nuri-txt">이 누리집은 대한민국 공식 전자정부 누리집입니다.</span>
					</div>
				</div>
			</div>
		</div>
		<!-- //top banner -->


		<!-- header inc -->
		<header id="krds-header"></header>
		<!-- //header inc -->

		<!-- header -->
		<!-- //header -->

		<!-- container -->
		<main id="container" class="main">
			<div class="swiper mySwiper">
				<div class="swiper-wrapper">
					<div class="swiper-slide">Slide 1</div>
					<div class="swiper-slide">Slide 2</div>
					<div class="swiper-slide">Slide 3</div>
				</div>
				<div class="swiper-pagination"></div>
			</div>
		</main>
		<!-- //container -->

		<!-- footer inc -->
		<footer id="krds-footer"></footer>
		<!-- //footer inc -->

	</div>

	<script>
		var swiper = new Swiper(".mySwiper", {
      direction: "vertical",
      slidesPerView: 1,
      spaceBetween: 30,
      mousewheel: {
				 releaseOnEdges: true,
			},
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
    });
	</script>

</body>
</html>
